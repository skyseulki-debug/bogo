<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>일일업무일지</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', '맑은 고딕', AppleGothic, 'Apple SD Gothic Neo', sans-serif;
      background: #e8e8e8;
      padding: 12px 10px 30px;
      min-height: 100vh;
    }

    .page { max-width: 480px; margin: 0 auto; }

    #report {
      background: #fff;
      padding: 10px;
      border: 1px solid #ccc;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }

    td {
      border: 1px solid #555;
      padding: 3px 4px;
      vertical-align: middle;
    }

    .c-title {
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      vertical-align: middle;
      height: 70px;
      letter-spacing: -0.5px;
    }

    .c-section {
      background: #c0c0c0;
      text-align: center;
      font-weight: bold;
      padding: 5px 4px;
      letter-spacing: 2px;
    }

    .c-label {
      text-align: center;
      background: #ebebeb;
      font-weight: bold;
      white-space: nowrap;
    }

    .c-time {
      text-align: center;
      white-space: nowrap;
      font-size: 11px;
      color: #222;
    }

    .c-total {
      text-align: center;
      font-weight: bold;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"] {
      width: 100%;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 12px;
      background: transparent;
      color: #111;
      min-height: 20px;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    /* 버튼 영역 */
    .btn-row {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 15px 8px;
      font-size: 15px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn:active { opacity: 0.75; }

    .btn-share {
      background: #fee500;
      color: #3c1e1e;
      flex: 2;
    }

    .btn-share:disabled {
      background: #f0d900;
      color: #888;
      cursor: not-allowed;
    }

    .btn-reset {
      background: #d8d8d8;
      color: #444;
      flex: 1;
    }

    /* 토스트 */
    #toast {
      display: none;
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.78);
      color: #fff;
      padding: 11px 20px;
      border-radius: 22px;
      font-size: 13px;
      z-index: 9999;
      white-space: nowrap;
      pointer-events: none;
    }

    /* 로딩 오버레이 */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.7);
      z-index: 9998;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      font-weight: bold;
      color: #333;
      font-family: inherit;
    }

    #overlay.show { display: flex; }

    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #ddd;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .overlay-inner { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  </style>
</head>
<body>

<div class="page">
  <!-- 폼 영역 (이미지로 캡처됨) -->
  <div id="report">
    <table>
      <colgroup>
        <col style="width:22%">
        <col style="width:33%">
        <col style="width:22%">
        <col style="width:23%">
      </colgroup>

      <!-- 헤더: 일일업무일지 + 날짜 -->
      <tr>
        <td colspan="2" class="c-title">일일업무일지</td>
        <td class="c-label">날짜</td>
        <td><input type="text" id="f-date" placeholder="YYYY-MM-DD"></td>
      </tr>

      <!-- 금일주요업무 -->
      <tr><td colspan="4" class="c-section">금일주요업무</td></tr>
      <tr>
        <td class="c-label">시 간</td>
        <td colspan="3" class="c-label">업 무 내 용</td>
      </tr>
      <tr><td class="c-time">08시 - 09시</td><td colspan="3"><input type="text" id="t0"></td></tr>
      <tr><td class="c-time">09시 - 10시</td><td colspan="3"><input type="text" id="t1"></td></tr>
      <tr><td class="c-time">10시 - 11시</td><td colspan="3"><input type="text" id="t2"></td></tr>
      <tr><td class="c-time">11시 - 12시</td><td colspan="3"><input type="text" id="t3"></td></tr>
      <tr><td class="c-time">12시 - 13시</td><td colspan="3"><input type="text" id="t4"></td></tr>
      <tr><td class="c-time">13시 - 14시</td><td colspan="3"><input type="text" id="t5"></td></tr>
      <tr><td class="c-time">14시 - 15시</td><td colspan="3"><input type="text" id="t6"></td></tr>
      <tr><td class="c-time">15시 - 16시</td><td colspan="3"><input type="text" id="t7"></td></tr>
      <tr><td class="c-time">16시 - 17시</td><td colspan="3"><input type="text" id="t8"></td></tr>
      <tr><td class="c-time">17시 - 18시</td><td colspan="3"><input type="text" id="t9"></td></tr>
      <tr><td class="c-time">18시 - 19시</td><td colspan="3"><input type="text" id="t10"></td></tr>

      <!-- 익일업무계획 -->
      <tr><td colspan="4" class="c-section">익 일 업 무 계 획</td></tr>
      <tr><td colspan="4" style="height:27px"><input type="text" id="n0"></td></tr>
      <tr><td colspan="4" style="height:27px"><input type="text" id="n1"></td></tr>
      <tr><td colspan="4" style="height:27px"><input type="text" id="n2"></td></tr>
      <tr><td colspan="4" style="height:27px"><input type="text" id="n3"></td></tr>
      <tr><td colspan="4" style="height:27px"><input type="text" id="n4"></td></tr>

      <!-- 금일 지출 내용 -->
      <tr><td colspan="4" class="c-section">금일 지출 내용</td></tr>
      <tr>
        <td colspan="2" class="c-label">구매사유</td>
        <td class="c-label">금액</td>
        <td class="c-label">비고</td>
      </tr>
      <tr>
        <td colspan="2"><input type="text" class="er"></td>
        <td><input type="number" class="ea" oninput="calcTotal()" placeholder="0"></td>
        <td><input type="text" class="en"></td>
      </tr>
      <tr>
        <td colspan="2"><input type="text" class="er"></td>
        <td><input type="number" class="ea" oninput="calcTotal()" placeholder="0"></td>
        <td><input type="text" class="en"></td>
      </tr>
      <tr>
        <td colspan="2"><input type="text" class="er"></td>
        <td><input type="number" class="ea" oninput="calcTotal()" placeholder="0"></td>
        <td><input type="text" class="en"></td>
      </tr>
      <tr>
        <td colspan="2"><input type="text" class="er"></td>
        <td><input type="number" class="ea" oninput="calcTotal()" placeholder="0"></td>
        <td><input type="text" class="en"></td>
      </tr>
      <tr>
        <td colspan="2"><input type="text" class="er"></td>
        <td><input type="number" class="ea" oninput="calcTotal()" placeholder="0"></td>
        <td><input type="text" class="en"></td>
      </tr>

      <!-- 합계 -->
      <tr>
        <td class="c-label" style="font-size:12px">합 계</td>
        <td></td>
        <td class="c-total" id="total">0</td>
        <td></td>
      </tr>

      <!-- 비고 -->
      <tr>
        <td class="c-label" style="font-size:12px">비 고</td>
        <td colspan="3"><input type="text" id="remark"></td>
      </tr>
    </table>
  </div>

  <!-- 버튼 -->
  <div class="btn-row">
    <button class="btn btn-share" id="shareBtn" onclick="captureAndShare()">
      📷 이미지 저장 &amp; 공유
    </button>
    <button class="btn btn-reset" onclick="resetForm()">초기화</button>
  </div>
</div>

<!-- 로딩 -->
<div id="overlay">
  <div class="overlay-inner">
    <div class="spinner"></div>
    <span>이미지 생성 중...</span>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
  // 오늘 날짜 자동 입력
  (function() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('f-date').value = `${yyyy}-${mm}-${dd}`;
  })();

  function calcTotal() {
    let sum = 0;
    document.querySelectorAll('.ea').forEach(el => sum += Number(el.value) || 0);
    document.getElementById('total').textContent = sum.toLocaleString();
  }

  function showToast(msg, ms = 3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.style.display = 'none', ms);
  }

  function setLoading(on) {
    document.getElementById('overlay').classList.toggle('show', on);
    document.getElementById('shareBtn').disabled = on;
  }

  // 입력 필드를 span으로 교체 → 캡처 → 복원 (html2canvas가 input 스타일을 못 읽는 경우 대비)
  function maskInputs() {
    const report = document.getElementById('report');
    const inputs = report.querySelectorAll('input');
    const saved = [];
    inputs.forEach(inp => {
      const span = document.createElement('span');
      let val = inp.value;
      if (inp.classList.contains('ea') && val) {
        val = Number(val).toLocaleString();
      }
      span.textContent = val;
      Object.assign(span.style, {
        display: 'block',
        fontFamily: 'inherit',
        fontSize: '12px',
        color: '#111',
        padding: '1px 2px',
        minHeight: '18px',
        wordBreak: 'break-all'
      });
      inp.parentNode.insertBefore(span, inp);
      inp.style.display = 'none';
      saved.push({ inp, span });
    });
    return saved;
  }

  function restoreInputs(saved) {
    saved.forEach(({ inp, span }) => {
      span.remove();
      inp.style.display = '';
    });
  }

  function canvasToBlob(canvas) {
    return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
  }

  function downloadImage(canvas, filename) {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  async function captureAndShare() {
    setLoading(true);
    const saved = maskInputs();

    try {
      const report = document.getElementById('report');
      const canvas = await html2canvas(report, {
        scale: 2.5,
        backgroundColor: '#ffffff',
        useCORS: true,
        logging: false
      });

      restoreInputs(saved);

      const dateVal = document.getElementById('f-date').value || '미입력';
      const filename = `일일업무일지_${dateVal}.png`;

      const blob = await canvasToBlob(canvas);
      const file = new File([blob], filename, { type: 'image/png' });

      // Web Share API (모바일 Safari/Chrome 지원)
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({
            files: [file],
            title: '일일업무일지',
            text: `${dateVal} 일일업무일지`
          });
          showToast('공유가 완료되었습니다 ✓');
        } catch (e) {
          if (e.name === 'AbortError') {
            // 사용자가 취소
          } else {
            downloadImage(canvas, filename);
            showToast('이미지가 저장되었습니다. 갤러리에서 카카오톡으로 공유하세요.');
          }
        }
      } else {
        // 데스크톱 or 미지원 브라우저 → 다운로드
        downloadImage(canvas, filename);
        showToast('이미지 저장 완료! 갤러리에서 카카오톡으로 공유하세요.');
      }
    } catch (err) {
      restoreInputs(saved);
      showToast('오류가 발생했습니다. 다시 시도해주세요.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  function resetForm() {
    if (!confirm('모든 내용을 초기화하시겠습니까?')) return;
    document.querySelectorAll('#report input').forEach(el => {
      if (el.id === 'f-date') {
        const d = new Date();
        el.value = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      } else {
        el.value = '';
      }
    });
    document.getElementById('total').textContent = '0';
  }
</script>
</body>
</html>
